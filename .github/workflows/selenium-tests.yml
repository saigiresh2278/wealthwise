name: Selenium E2E Web Testing

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  selenium-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Chrome Browser
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
        id: setup-chrome

      - name: Print Chrome version (for debugging)
        run: google-chrome --version || chromium-browser --version || true

      - name: Install Frontend Dependencies
        run: |
          cd "Sai giresh app/frontend"
          npm install --prefer-offline

      - name: Install Selenium Test Dependencies
        run: |
          cd "Sai giresh app/frontend/selenium-tests"
          npm install --prefer-offline

      - name: Generate E2E Test Cases Excel Sheet
        run: |
          cd "Sai giresh app/frontend/selenium-tests"
          node generate-test-cases.js
        continue-on-error: true

      - name: Start Next.js App in Background
        run: |
          cd "Sai giresh app/frontend"
          npm run dev &
          npx wait-on http://localhost:3000 --timeout 60000

      - name: Run Selenium E2E Tests
        run: |
          cd "Sai giresh app/frontend/selenium-tests"
          npm test
        env:
          # Selenium Manager auto-downloads the correct ChromeDriver
          # by detecting the installed Chrome binary version
          SE_AVOID_BROWSER_DOWNLOAD: "0"
          DISPLAY: ':99'

      - name: Upload Selenium Excel Report Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Selenium-E2E-Test-Cases
          path: "Sai giresh app/frontend/selenium-tests/WealthWise_E2E_Test_Cases.xlsx"

      - name: Upload Load Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-test-report
          # The quotes below are required to handle the spaces in "Sai giresh app"
          path: "Sai giresh app/backend/reports/WealthWise_LoadTest_Report_*"
      - name: Generate Load Test Job Summary
        if: always()
        run: |
          cd "Sai giresh app/backend/automated-test"
          npm install
          node print-summary.js

      - name: Commit and Push Excel Reports
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "Sai giresh app/frontend/selenium-tests/WealthWise_E2E_Test_Cases.xlsx" || true
          git add "Sai giresh app/backend/reports/WealthWise_LoadTest_Report_*.xlsx" || true
          git commit -m "docs: auto-update test reports [skip ci]" || echo "No changes to commit"
          git push
