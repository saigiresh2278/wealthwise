name: Load Testing

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  load-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: "Sai giresh app/backend/automated-test/package-lock.json"

      - name: Install Backend Dependencies
        run: |
          cd "Sai giresh app/backend"
          npm install --prefer-offline

      - name: Install Load Test Dependencies
        run: |
          cd "Sai giresh app/backend/automated-test"
          npm install --prefer-offline

      - name: Start Backend Server in Background
        run: |
          cd "Sai giresh app/backend"
          npm run build || true
          node dist/server.js &
          echo "Waiting for backend to be ready on port 5000..."
          sleep 10
        env:
          PORT: 5000
          NODE_ENV: ci
        continue-on-error: true

      - name: Run Load Tests
        run: |
          cd "Sai giresh app/backend/automated-test"
          node loadtest.js
        env:
          BASE_URL: http://localhost:5000/api
        continue-on-error: true

      - name: Generate Load Test Excel Report
        run: |
          cd "Sai giresh app/backend/automated-test"
          node generateReport.js
        continue-on-error: true

      - name: Generate Load Test Job Summary
        if: always()
        run: |
          cd "Sai giresh app/backend/automated-test"
          node print-summary.js
        continue-on-error: true

      - name: Upload Load Test Report Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: WealthWise-LoadTest-Report
          path: "Sai giresh app/backend/reports/WealthWise_LoadTest_Report_*.xlsx"
          if-no-files-found: warn

      - name: Commit and Push Load Test Report
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "Sai giresh app/backend/reports/WealthWise_LoadTest_Report_*.xlsx" || true
          git commit -m "docs: auto-update load test report [skip ci]" || echo "No changes to commit"
          git push
