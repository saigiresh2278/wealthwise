name: Deploy Next.js to GitHub Pages

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

# Allow only one concurrent deployment at a time.
# cancel-in-progress: false means a new run will WAIT for the running one
# to finish instead of cancelling it (avoids the "cancel failed" error).
concurrency:
  group: "pages"
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build Next.js
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next

      - name: Restore Next.js cache
        uses: actions/cache@v4
        with:
          path: |
            Sai giresh app/frontend/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('Sai giresh app/frontend/package-lock.json') }}-${{ hashFiles('Sai giresh app/frontend/src/**/*.{ts,tsx,js,jsx}') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('Sai giresh app/frontend/package-lock.json') }}-

      - name: Install Dependencies
        run: |
          cd "Sai giresh app/frontend"
          npm ci

      - name: Build with Next.js (static export)
        run: |
          cd "Sai giresh app/frontend"
          npm run build
        env:
          NODE_ENV: production

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "Sai giresh app/frontend/out"

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
