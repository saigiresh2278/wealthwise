name: WealthWise DAST Security Test Suite

on:
  push:
    branches: [main, web-frontend]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * 1'   # Weekly Monday 2 AM UTC
  workflow_dispatch:       # Manual trigger

permissions:
  contents: read
  security-events: write

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Static Code Audit + Secrets Scan
  # ─────────────────────────────────────────────
  static-audit:
    name: Static Code Audit & Secrets Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/automated-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python audit dependencies
        run: |
          pip install --upgrade pip
          pip install openpyxl requests

      - name: Run Hardcoded Secrets Scanner
        run: python test_secrets_scan.py

      - name: Generate DAST Excel Report (Static Cases)
        run: python generate_report.py

      - name: Upload DAST Excel Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WealthWise-DAST-Report
          path: backend/automated-test/WealthWise_DAST_Report.xlsx
          retention-days: 30

      - name: Upload JSON Results
        uses: actions/upload-artifact@v4
        with:
          name: WealthWise-DAST-JSON
          path: backend/automated-test/report.json
          retention-days: 30

  # ─────────────────────────────────────────────
  # JOB 2: Live API DAST Tests (server must be running)
  # ─────────────────────────────────────────────
  live-dast:
    name: Live API DAST Tests
    runs-on: ubuntu-latest
    needs: static-audit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install fastapi uvicorn python-dotenv
          pip install openpyxl requests

      - name: Create .env with test GEMINI_API_KEY placeholder
        working-directory: backend
        run: |
          echo "GEMINI_API_KEY=your_gemini_api_key_here" > .env

      - name: Start WealthWise Backend Server
        working-directory: backend
        run: |
          python -m uvicorn main:app --host 0.0.0.0 --port 8000 &
          echo "Waiting for server to start..."
          for i in {1..15}; do
            if curl -s http://localhost:8000/ > /dev/null 2>&1; then
              echo "✓ Server is up on port 8000"
              break
            fi
            sleep 2
          done

      - name: Write test input config
        working-directory: backend/automated-test
        run: |
          echo '{"baseUrl": "http://localhost:8000", "public": "", "admin": "", "user": ""}' > input.json

      - name: Run AuthN Bypass Tests
        working-directory: backend/automated-test
        run: python test_authn_bypass.py

      - name: Run Injection Probe Tests
        working-directory: backend/automated-test
        run: python test_injection.py

      - name: Run Rate Limiting Tests
        working-directory: backend/automated-test
        run: python test_rate_limit.py

      - name: Upload Live Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: WealthWise-Live-DAST-Results
          path: |
            backend/automated-test/results_authn.json
            backend/automated-test/results_injection.json
            backend/automated-test/results_ratelimit.json
            backend/automated-test/results_secrets.json
          retention-days: 30

      - name: Stop Backend Server
        if: always()
        run: pkill -f uvicorn || true

  # ─────────────────────────────────────────────
  # JOB 3: Dependency Security Audit
  # ─────────────────────────────────────────────
  dependency-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install safety and pip-audit
        run: pip install safety pip-audit

      - name: Run pip-audit on backend dependencies
        working-directory: backend
        run: pip-audit -r requirements.txt --format markdown || true

      - name: Run safety check
        working-directory: backend
        run: safety check -r requirements.txt --output text || true

  # ─────────────────────────────────────────────
  # JOB 4: Frontend DAST (E2E Selenium)
  # ─────────────────────────────────────────────
  frontend-e2e:
    name: Frontend E2E Selenium Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Install Chrome for Selenium
        uses: browser-actions/setup-chrome@v1

      - name: Set up Python 3.11 (for backend)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install fastapi uvicorn python-dotenv
          echo "GEMINI_API_KEY=your_gemini_api_key_here" > .env

      - name: Start Backend Server
        working-directory: backend
        run: |
          python -m uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 5

      - name: Run Selenium E2E Tests
        working-directory: frontend/selenium-tests
        run: npm test -- --forceExit
        env:
          HEADLESS: "true"
          BASE_URL: "http://localhost:8000"

      - name: Upload E2E Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Selenium-E2E-Results
          path: frontend/selenium-tests/test-results/
          retention-days: 30

      - name: Upload WealthWise E2E Excel Sheet
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: WealthWise-E2E-Test-Cases-Excel
          path: frontend/selenium-tests/WealthWise_E2E_Test_Cases.xlsx
          retention-days: 30
